name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release
        run: |
          mkdir -p dist/xhs2obsidian
          cp main.js manifest.json styles.css dist/xhs2obsidian/
          cd dist && zip -r xhs2obsidian-${{ github.ref_name }}.zip xhs2obsidian/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/xhs2obsidian-${{ github.ref_name }}.zip
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
