name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release
        run: |
          mkdir -p dist/xhs2obsidian
          cp main.js manifest.json styles.css dist/xhs2obsidian/
          cd dist && zip -r xhs2obsidian-${{ github.ref_name }}.zip xhs2obsidian/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/xhs2obsidian-${{ github.ref_name }}.zip
            main.js
            manifest.json
            styles.css
          body: |
            ## 安装 / 更新方法

            1. 下载下方的 `xhs2obsidian-${{ github.ref_name }}.zip`
            2. 解压后将文件夹复制到 Vault 的 `.obsidian/plugins/` 目录
            3. Obsidian → 设置 → 第三方插件 → 刷新列表 → 启用 **XHS Sync**

            或单独下载 `main.js`、`manifest.json`、`styles.css` 放入 `.obsidian/plugins/xhs2obsidian/`

            ---

            ## 功能列表

            ### 内容同步
            - 📚 同步小红书**收藏、点赞、个人帖子**到 Obsidian Markdown 笔记
            - 🔖 **账号订阅**：订阅任意公开账号，自动同步其最新 30 篇帖子及用户主页信息
            - 🔍 **关键词搜索**同步：按关键词抓取匹配笔记，支持排序/类型/时间/范围过滤

            ### 媒体与文件
            - 🖼️ **图片/视频本地下载**：每篇笔记独立媒体文件夹，离线可查
            - 📁 **专辑目录**：收藏夹按专辑自动分子目录
            - 👤 **用户档案**：订阅账号的昵称、粉丝数等信息保存为 `_profile.md`

            ### 自动化
            - 🤖 **AI 自动分类**：接入 OpenAI 兼容 API，自动归类到自定义文件夹
            - 🔄 **增量同步**：记录已同步 ID，重复运行只拉取新内容
            - ⏱️ **定时自动同步**：同步、关键词搜索、账号订阅均支持独立定时后台运行

            ### 数据
            - 📝 **结构化 Frontmatter**：记录 ID、标签、点赞数、评论数、同步时间

            ---

            ## 注意事项

            - 仅支持 Obsidian **桌面端**（macOS / Windows / Linux）
            - 首次使用需在内置浏览器中完成一次小红书登录
            - Cookie 有效期约 30–90 天，过期后重新登录即可
          generate_release_notes: true
